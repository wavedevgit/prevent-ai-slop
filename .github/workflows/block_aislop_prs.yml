name: PR Gatekeeper

on:
    pull_request:
        types: [opened, edited, synchronize]

permissions:
    contents: read
    issues: write
    pull-requests: write

jobs:
    moderate:
        runs-on: ubuntu-latest

        steps:
            - name: Check PR content
              uses: actions/github-script@v7
              with:
                  script: |
                      const pr = context.payload.pull_request;
                      const title = (pr.title || "").toLowerCase();
                      const body = (pr.body || "").toLowerCase();

                      let reasons = [];

                      const bannedPhrases = [
                        "🤖 generated with [claude code](https://claude.ai/claude-code)",
                        "generated by chatgpt",
                        "ai generated"
                      ].map(p => p.toLowerCase());

                      for (const phrase of bannedPhrases) {
                        if (title.includes(phrase) || body.includes(phrase)) {
                          reasons.push(`Contains banned phrase: "${phrase}"`);
                        }
                      }

                      const blacklist = ["claude", "codex"];

                      const commits = await github.paginate(
                        github.rest.pulls.listCommits,
                        {
                          ...context.repo,
                          pull_number: pr.number,
                          per_page: 100
                        }
                      );

                      const flaggedAuthors = new Set();

                      for (const commit of commits) {
                        const authorLogin = commit.author?.login?.toLowerCase();
                        const commitAuthorName = commit.commit.author.name.toLowerCase();
                        const commitMessage = (commit.commit.message || "").toLowerCase();

                        for (const bad of blacklist) {
                          if (
                            authorLogin === bad ||
                            commitAuthorName.includes(bad)
                          ) {
                            flaggedAuthors.add(authorLogin || commitAuthorName);
                          }
                        }

                        for (const phrase of bannedPhrases) {
                          if (commitMessage.includes(phrase)) {
                            reasons.push(
                              `Commit "${commit.sha.substring(0,7)}" contains banned phrase: "${phrase}"`
                            );
                          }
                        }
                      }

                      if (flaggedAuthors.size > 0) {
                        reasons.push(
                          `Blacklisted author(s): ${[...flaggedAuthors].join(", ")}`
                        );
                      }

                      if (reasons.length > 0) {
                        const message = `Closing PR automatically:\n\n- ${reasons.join("\n- ")}`;

                        await github.rest.issues.createComment({
                          ...context.repo,
                          issue_number: pr.number,
                          body: message
                        });

                        await github.rest.pulls.update({
                          ...context.repo,
                          pull_number: pr.number,
                          state: "closed"
                        });
                      }
